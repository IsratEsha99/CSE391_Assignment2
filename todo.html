<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Question 3 - To-Do List</title>
<style>
  :root{
    --bg: #f4f7fa;
    --card: #ffffff;
    --ink: #1e2a3a;
    --muted: #5b6b7f;
    --accent: #3a6ea5;
    --danger: #e74c3c;
    --border: #d7e0e9;
  }
  *{ box-sizing: border-box; }
  body{
    margin:0;
    font-family: 'Segoe UI', Tahoma, Verdana, sans-serif;
    background: var(--bg);
    color: var(--ink);
    min-height:100vh;
    display:flex;
    flex-direction:column;
  }
  header{
    background: var(--card);
    border-bottom: 1px solid var(--border);
    padding: 20px;
    text-align:center;
  }
  header a{ color: var(--accent); text-decoration:none; font-size:0.9rem; }
  header h1{ margin: 6px 0 0; font-size: 1.4rem; }

  main{
    flex:1;
    display:flex;
    justify-content:center;
    padding: 30px 16px;
  }

  .todo-card{
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px;
    width: 100%;
    max-width: 460px;
    box-shadow: 0 6px 20px rgba(30,42,58,0.08);
    height: fit-content;
  }

  .input-row{
    display:flex;
    gap: 8px;
    margin-bottom: 18px;
  }
  #task-input{
    flex:1;
    padding: 10px 12px;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 0.95rem;
    outline: none;
  }
  #task-input:focus{ border-color: var(--accent); }

  #add-btn{
    padding: 10px 18px;
    border: none;
    border-radius: 8px;
    background: var(--accent);
    color: #fff;
    font-weight: 600;
    cursor: pointer;
  }
  #add-btn:hover{ opacity: 0.9; }

  #task-list{
    list-style: none;
    margin: 0;
    padding: 0;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .task-item{
    display:flex;
    align-items:center;
    gap: 10px;
    padding: 10px 12px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: #fafcfe;
  }
  .task-item input[type="checkbox"]{
    width: 18px;
    height: 18px;
    cursor: pointer;
    accent-color: var(--accent);
    flex-shrink: 0;
  }
  .task-text{
    flex: 1;
    word-break: break-word;
  }
  .task-item.completed .task-text{
    text-decoration: line-through;
    color: var(--muted);
  }
  .delete-btn{
    border: none;
    background: none;
    color: var(--danger);
    font-size: 1.1rem;
    cursor: pointer;
    line-height: 1;
    padding: 4px 6px;
  }
  .delete-btn:hover{ opacity: 0.7; }

  #empty-msg{
    color: var(--muted);
    text-align: center;
    font-size: 0.9rem;
    padding: 12px 0;
  }

  footer{
    text-align:center;
    padding: 16px;
    color: var(--muted);
    font-size: 0.85rem;
    border-top: 1px solid var(--border);
    background: var(--card);
  }
</style>
</head>
<body>

<header>
  <a href="index.html">&larr; Back to Assignment Home</a>
  <h1>Question 3: To-Do List</h1>
</header>

<main>
  <div class="todo-card">
    <div class="input-row">
      <input type="text" id="task-input" placeholder="Add a new task..." />
      <button id="add-btn">Add</button>
    </div>

    <ul id="task-list"></ul>
    <p id="empty-msg" style="display:none;">No tasks yet. Add one above!</p>
  </div>
</main>

<footer>Israt Jahan Esha &bull; CSE 391 &bull; Assignment 2</footer>

<script>
  // ---------------------------------------------------------
  // Question 3: To-Do List
  // Tasks are stored in localStorage so they persist between
  // page refreshes and browser sessions.
  // ---------------------------------------------------------

  const STORAGE_KEY = "cse391_assignment2_tasks";

  const taskInput = document.getElementById("task-input");
  const addBtn = document.getElementById("add-btn");
  const taskList = document.getElementById("task-list");
  const emptyMsg = document.getElementById("empty-msg");

  // Load tasks from localStorage (or start with an empty list)
  function loadTasks(){
    const raw = localStorage.getItem(STORAGE_KEY);
    return raw ? JSON.parse(raw) : [];
  }

  // Save the current tasks array back to localStorage
  function saveTasks(tasks){
    localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));
  }

  let tasks = loadTasks();

  // Build/refresh the visible list from the tasks array
  function renderTasks(){
    taskList.innerHTML = "";

    if (tasks.length === 0) {
      emptyMsg.style.display = "block";
    } else {
      emptyMsg.style.display = "none";
    }

    tasks.forEach((task) => {
      const li = document.createElement("li");
      li.className = "task-item" + (task.completed ? " completed" : "");
      li.dataset.id = task.id;

      const checkbox = document.createElement("input");
      checkbox.type = "checkbox";
      checkbox.checked = task.completed;
      checkbox.addEventListener("change", () => toggleTask(task.id));

      const span = document.createElement("span");
      span.className = "task-text";
      span.textContent = task.text;

      const deleteBtn = document.createElement("button");
      deleteBtn.className = "delete-btn";
      deleteBtn.textContent = "✕";
      deleteBtn.title = "Delete task";
      deleteBtn.addEventListener("click", () => deleteTask(task.id));

      li.appendChild(checkbox);
      li.appendChild(span);
      li.appendChild(deleteBtn);
      taskList.appendChild(li);
    });
  }

  // Add a new task from the input field
  function addTask(){
    const text = taskInput.value.trim();
    if (text === "") return;

    tasks.push({
      id: Date.now().toString(),
      text: text,
      completed: false
    });

    saveTasks(tasks);
    renderTasks();

    taskInput.value = "";
    taskInput.focus();
  }

  // Flip a task's completed state
  function toggleTask(id){
    tasks = tasks.map((task) =>
      task.id === id ? { ...task, completed: !task.completed } : task
    );
    saveTasks(tasks);
    renderTasks();
  }

  // Remove a task entirely
  function deleteTask(id){
    tasks = tasks.filter((task) => task.id !== id);
    saveTasks(tasks);
    renderTasks();
  }

  addBtn.addEventListener("click", addTask);
  taskInput.addEventListener("keydown", (e) => {
    if (e.key === "Enter") addTask();
  });

  // Initial render on page load
  renderTasks();
</script>

</body>
</html>
